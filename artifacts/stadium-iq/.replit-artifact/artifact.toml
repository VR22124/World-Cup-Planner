kind = "web"
previewPath = "/"
title = "StadiumIQ AI"
version = "1.0.0"
id = "artifacts/stadium-iq"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22837

[services.development]
run = "pnpm --filter @workspace/stadium-iq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-iq", "run", "build" ]
serve = "static"
publicDir = "artifacts/stadium-iq/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22837"
BASE_PATH = "/"
