services:
  - type: web
    name: world-cup-planner-api
    env: node
    buildCommand: pnpm install && pnpm run build
    startCommand: cd apps/api && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
